name: Refresh KR cache

# 한국주식 시세 자동 갱신
# 트리거: 월~금 KST 15:40 / 16:10 / 16:40 (= UTC 06:40 / 07:10 / 07:40)
#   한국 정규장 종료(KST 15:30) 후 10분 여유. GitHub Actions cron 지연/누락 대비
#   백업 슬롯 2개 추가. 첫 실행이 성공하면 precheck 가 스킵 처리.
# 동작: scripts/refresh_cache.py --market kr 실행 후
#   screening_cache.db 를 data-cache 브랜치에 orphan force-push.

on:
  schedule:
    - cron: '40 6 * * 1-5'    # UTC 06:40 (월~금 KST 15:40) - primary
    - cron: '10 7 * * 1-5'    # UTC 07:10 (월~금 KST 16:10) - backup
    - cron: '40 7 * * 1-5'    # UTC 07:40 (월~금 KST 16:40) - backup
  workflow_dispatch:

# 같은 시장끼리는 직렬화. US와는 시간이 안 겹쳐 별도 그룹.
concurrency:
  group: refresh-kr
  cancel-in-progress: false

jobs:
  # cron 트리거가 같은 날 이미 성공했으면 후속 백업 슬롯에서 스킵.
  # workflow_dispatch (수동) 는 항상 실행.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check freshness
        id: check
        run: |
          set -e
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual run — proceeding."
            exit 0
          fi
          KST_TODAY=$(TZ='Asia/Seoul' date +"%Y-%m-%d")
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/data-cache"
          SKIP=false
          if LU=$(curl -fsSL "$BASE/last_updated.txt" 2>/dev/null); then
            if echo "$LU" | grep -q "^market=kr$" && echo "$LU" | grep -q "^kst=$KST_TODAY"; then
              SKIP=true
              echo "✅ KR already refreshed today ($KST_TODAY) — will skip."
            fi
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

  refresh:
    needs: precheck
    if: needs.precheck.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download existing cache from data-cache branch
        continue-on-error: true
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/data-cache"
          # 새 포맷(.gz) 우선, 없으면 legacy .db 폴백.
          if curl -fsSL -o screening_cache.db.gz "$BASE/screening_cache.db.gz"; then
            gunzip -f screening_cache.db.gz
            echo "Cache (gz) downloaded: $(du -h screening_cache.db | cut -f1)"
          elif curl -fsSL -o screening_cache.db "$BASE/screening_cache.db"; then
            echo "Cache (legacy .db) downloaded: $(du -h screening_cache.db | cut -f1)"
          else
            rm -f screening_cache.db.gz screening_cache.db
            echo "No existing cache (first run). Will create fresh."
          fi

      - name: Run refresh
        id: refresh
        run: |
          mkdir -p .ci-out
          python -m scripts.refresh_cache --market kr --json-out .ci-out/result.json
        continue-on-error: true

      - name: Capture summary
        id: summary
        if: always()
        run: |
          if [ -f .ci-out/result.json ]; then
            SUMMARY=$(python -c "import json; d=json.load(open('.ci-out/result.json',encoding='utf-8')); print(d.get('summary') or d.get('fatal') or 'no summary')")
          else
            SUMMARY="(스크립트가 result.json 을 생성하지 못함)"
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "exit_code=${{ steps.refresh.outcome }}" >> "$GITHUB_OUTPUT"

      - name: Push cache to data-cache branch
        if: steps.refresh.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOW_KST=$(TZ='Asia/Seoul' date +"%Y-%m-%d %H:%M KST")
          echo "$NOW_UTC" > last_updated.txt
          echo "market=kr" >> last_updated.txt
          echo "kst=$NOW_KST" >> last_updated.txt
          echo "summary=${{ steps.summary.outputs.summary }}" >> last_updated.txt

          # GitHub 100MB 파일 제한 회피 — gzip 압축 후 push.
          gzip -9 -f screening_cache.db
          ls -lh screening_cache.db.gz

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data-cache-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          # -f 필수: main 의 .gitignore 가 screening_cache.db* 를 무시 룰로 잡고 있음.
          git add -f screening_cache.db.gz last_updated.txt
          git commit -m "KR refresh $NOW_KST"
          git push --force origin HEAD:data-cache

      - name: Notify Telegram on failure
        if: steps.refresh.outcome != 'success' || failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets not set — skipping notify."
            exit 0
          fi
          MSG=$(printf '🔴 스크리닝 자동갱신 실패 (KR)\n%s\nrun: %s' "$SUMMARY" "$RUN_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" || true
